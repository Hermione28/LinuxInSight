<!doctype html>
<html>
  <head>
    <title>LinuxInsight</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: #0f172a;
        color: white;
        display: flex;
      }

      .sidebar {
        width: 200px;
        background: #020617;
        padding: 20px;
        height: 100vh;
      }

      .sidebar h2 {
        color: #3b82f6;
      }

      .sidebar a {
        display: block;
        color: white;
        margin: 10px 0;
        text-decoration: none;
      }

      .main {
        flex: 1;
        padding: 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
      }

      .card {
        background: #1e293b;
        padding: 20px;
        border-radius: 10px;
      }

      .value {
        font-size: 28px;
      }

      table {
        width: 100%;
        margin-top: 20px;
      }

      .graph-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 30px;
      }

      .graph-card {
        background: #1e293b;
        padding: 20px;
        border-radius: 12px;
        transition: 0.2s;
      }

      .graph-card:hover {
        transform: scale(1.02);
      }

      canvas {
        width: 100% !important;
        height: 250px !important;
      }

      #alertBox {
        display: none;
        background: #ef4444;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 15px;
      }
    </style>
  </head>

  <body>
    <div class="sidebar">
      <h2>LinuxInsight</h2>
      <a href="#">Dashboard</a>
      <a href="/logout">Logout</a>
    </div>

    <div class="main">
      <h1>System Metrics</h1>

      <div id="alertBox">⚠️ High CPU Usage!</div>

      <div class="grid">
        <div class="card">
          CPU:
          <div id="cpu" class="value"></div>
        </div>
        <div class="card">
          Memory:
          <div id="memory" class="value"></div>
        </div>
        <div class="card">
          Disk:
          <div id="disk" class="value"></div>
        </div>
        <div class="card">
          Network:
          <div id="network" class="value"></div>
        </div>
      </div>

      <h2>📈 System Graphs</h2>

      <div class="graph-container">
        <div class="graph-card">
          <h3>CPU Usage</h3>
          <canvas id="cpuChart"></canvas>
        </div>

        <div class="graph-card">
          <h3>Memory Usage</h3>
          <canvas id="memoryChart"></canvas>
        </div>
      </div>

      <h2>Docker Containers</h2>
      <table>
        <tbody id="containers"></tbody>
      </table>
    </div>

    <script>
      let cpuChart, memoryChart;

      // ✅ Ask notification permission
      if (Notification.permission !== "granted") {
        Notification.requestPermission();
      }

      // ✅ Create charts
      function createCharts() {
        const cpuCtx = document.getElementById("cpuChart").getContext("2d");
        const memCtx = document.getElementById("memoryChart").getContext("2d");

        cpuChart = new Chart(cpuCtx, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                data: [],
                borderColor: "#22c55e",
                backgroundColor: "rgba(34,197,94,0.2)",
                tension: 0.4,
                fill: true,
              },
            ],
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              x: { display: false },
              y: { ticks: { color: "white" } },
            },
          },
        });

        memoryChart = new Chart(memCtx, {
          type: "line",
          data: {
            labels: [],
            datasets: [
              {
                data: [],
                borderColor: "#3b82f6",
                backgroundColor: "rgba(59,130,246,0.2)",
                tension: 0.4,
                fill: true,
              },
            ],
          },
          options: {
            plugins: { legend: { display: false } },
            scales: {
              x: { display: false },
              y: { ticks: { color: "white" } },
            },
          },
        });
      }

      // ✅ Fetch data
      async function fetchData() {
        const res = await fetch("/metrics");
        const data = await res.json();

        // cards
        document.getElementById("cpu").innerText = data.cpu + "%";
        document.getElementById("memory").innerText = data.memory + "%";
        document.getElementById("disk").innerText = data.disk + "%";

        document.getElementById("network").innerText =
          data.network.sent + "/" + data.network.recv;

        // alert
        if (data.cpu > 80) {
          document.getElementById("alertBox").style.display = "block";
        } else {
          document.getElementById("alertBox").style.display = "none";
        }

        // notification
        if (data.cpu > 90 && Notification.permission === "granted") {
          new Notification("⚠️ High CPU Usage", {
            body: "CPU usage is above 90%",
          });
        }

        // charts update
        cpuChart.data.labels.push("");
        cpuChart.data.datasets[0].data.push(data.cpu);

        if (cpuChart.data.labels.length > 20) {
          cpuChart.data.labels.shift();
          cpuChart.data.datasets[0].data.shift();
        }

        cpuChart.update();

        memoryChart.data.labels.push("");
        memoryChart.data.datasets[0].data.push(data.memory);

        if (memoryChart.data.labels.length > 20) {
          memoryChart.data.labels.shift();
          memoryChart.data.datasets[0].data.shift();
        }

        memoryChart.update();

        // containers
        let rows = "";
        data.containers.forEach((c) => {
          rows += `<tr><td>${c.name}</td><td>${c.status}</td></tr>`;
        });

        document.getElementById("containers").innerHTML = rows;
      }

      // INIT
      createCharts();
      setInterval(fetchData, 2000);
      fetchData();
    </script>
  </body>
</html>
