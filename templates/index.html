<!doctype html>
<html>
  <head>
    <title>LinuxInsight</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #0b0f19;
        color: #e5e7eb;
      }

      /* ✅ FIXED TITLE */
      .title {
        text-align: center;
        padding: 20px;
        font-size: 28px;
        font-weight: 600;
        color: #60a5fa;
        letter-spacing: 1px;
      }

      .title span {
        font-size: 16px;
        color: #9ca3af;
        font-weight: 400;
        margin-left: 8px;
      }

      .container {
        width: 90%;
        margin: auto;
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 25px;
      }

      .card {
        background: #111827;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.4);
      }

      .card h3 {
        margin: 0;
        font-size: 14px;
        color: #9ca3af;
      }

      .card p {
        font-size: 22px;
        margin-top: 10px;
      }

      .charts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .panel {
        background: #111827;
        padding: 15px;
        border-radius: 10px;
        height: 260px;
      }

      .panel h4 {
        margin-bottom: 10px;
        color: #9ca3af;
      }

      canvas {
        width: 100% !important;
        height: 200px !important;
      }

      table {
        width: 100%;
        margin-top: 30px;
        border-collapse: collapse;
        background: #111827;
      }

      th,
      td {
        padding: 10px;
        text-align: center;
      }

      th {
        background: #1f2937;
      }
    </style>
  </head>

  <body>
    <!-- ✅ ONLY ONE HEADING -->
    <h1 class="title">LinuxInsight <span> System Dashboard</span></h1>
    <h2>Docker Containers</h2>
    <div id="docker"></div>

    <div class="container">
      <!-- CARDS -->
      <div class="cards">
        <div class="card">
          <h3>CPU</h3>
          <p id="cpu">0%</p>
        </div>
        <div class="card">
          <h3>Memory</h3>
          <p id="memory">0%</p>
        </div>
        <div class="card">
          <h3>Disk</h3>
          <p id="disk">0%</p>
        </div>
        <div class="card">
          <h3>Network</h3>
          <p id="network">0</p>
        </div>
      </div>

      <!-- GRAPHS -->
      <div class="charts">
        <div class="panel">
          <h4>CPU Usage</h4>
          <canvas id="cpuChart"></canvas>
        </div>
        <div class="panel">
          <h4>Memory Usage</h4>
          <canvas id="memoryChart"></canvas>
        </div>
        <div class="panel">
          <h4>Disk Usage</h4>
          <canvas id="diskChart"></canvas>
        </div>
        <div class="panel">
          <h4>Network Usage</h4>
          <canvas id="networkChart"></canvas>
        </div>
      </div>

      <!-- TABLE -->
      <h3 style="margin-top: 30px">Top Processes</h3>

      <table>
        <thead>
          <tr>
            <th>PID</th>
            <th>Name</th>
            <th>CPU %</th>
            <th>Memory %</th>
          </tr>
        </thead>
        <tbody id="processTable"></tbody>
      </table>
    </div>

    <script src="/static/js/index-script.js"></script>
  </body>
</html>
