<!doctype html>
<html>
  <head>
    <title>LinuxInsight</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: #0b0f19;
        color: #e5e7eb;
      }

      /* 🔥 TITLE */
      .title {
        text-align: center;
        padding: 30px;
        font-size: 44px;
        font-weight: 900;
        color: #60a5fa;
        letter-spacing: 2px;
      }

      .title span {
        font-size: 18px;
        color: #9ca3af;
      }

      .container {
        width: 90%;
        margin: auto;
      }

      /* 🔥 TOP GRID */
      .top-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 25px;
      }

      /* 🔥 PANELS */
      .panel {
        background: #111827;
        padding: 20px;
        border-radius: 14px;
        box-shadow: 0 0 15px rgba(0, 0, 0, 0.4);
      }

      .panel h3 {
        margin-bottom: 10px;
        color: #9ca3af;
      }

      /* 🔥 CARDS */
      .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
        margin-bottom: 25px;
      }

      .card {
        background: #111827;
        padding: 20px;
        border-radius: 12px;
        text-align: center;
        transition: 0.2s;
      }

      .card:hover {
        transform: translateY(-3px);
      }

      .card h3 {
        font-size: 14px;
        color: #9ca3af;
      }

      .card p {
        font-size: 24px;
        font-weight: bold;
      }

      /* 🔥 CHARTS */
      .charts {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      canvas {
        width: 100% !important;
        height: 200px !important;
      }

      /* 🔥 TABLE */
      table {
        width: 100%;
        margin-top: 30px;
        border-collapse: collapse;
        background: #111827;
        border-radius: 10px;
        overflow: hidden;
      }

      th,
      td {
        padding: 12px;
        text-align: center;
      }

      th {
        background: #1f2937;
        color: #9ca3af;
      }

      tr:hover {
        background: #1f2937;
      }

      /* 🔥 DOCKER SCROLL */
      #docker {
        max-height: 200px;
        overflow-y: auto;
      }

      /* 📱 MOBILE */
      @media (max-width: 768px) {
        .top-grid {
          grid-template-columns: 1fr;
        }

        .cards {
          grid-template-columns: 1fr 1fr;
        }

        .charts {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <h1 class="title">LinuxInsight <span>System Dashboard</span></h1>

    <!-- 🔥 TOP SECTION -->
    <div class="container">
      <div class="top-grid">
        <!-- Docker -->
        <div class="panel">
          <h3>🐳 Docker Containers</h3>
          <div id="docker"></div>
        </div>

        <!-- Health -->
        <div class="panel">
          <h3>💚 System Health</h3>
          <h2 id="health"></h2>
        </div>

        <!-- Trends -->
        <div class="panel">
          <h3>📊 Trends</h3>
          <p>CPU: <span id="cpu_trend"></span></p>
          <p>Memory: <span id="memory_trend"></span></p>
        </div>

        <!-- Anomaly -->
        <div class="panel">
          <h3>🚨 Anomaly Detection</h3>
          <p>CPU: <span id="cpu_anomaly"></span></p>
          <p>Memory: <span id="memory_anomaly"></span></p>
        </div>
      </div>
    </div>

    <!-- 🔥 MAIN SECTION -->
    <div class="container">
      <!-- CARDS -->
      <div class="cards">
        <div class="card">
          <h3>CPU</h3>
          <p id="cpu">0%</p>
        </div>
        <div class="card">
          <h3>Memory</h3>
          <p id="memory">0%</p>
        </div>
        <div class="card">
          <h3>Disk</h3>
          <p id="disk">0%</p>
        </div>
        <div class="card">
          <h3>Network</h3>
          <p id="network">0</p>
        </div>
      </div>

      <!-- CHARTS -->
      <div class="charts">
        <canvas id="cpuChart"></canvas>
        <canvas id="memoryChart"></canvas>
        <canvas id="diskChart"></canvas>
        <canvas id="networkChart"></canvas>
      </div>

      <!-- TABLE -->
      <h3 style="margin-top: 30px">Top Processes</h3>
      <table>
        <thead>
          <tr>
            <th>PID</th>
            <th>Name</th>
            <th>CPU %</th>
            <th>Memory %</th>
          </tr>
        </thead>
        <tbody id="processTable"></tbody>
      </table>
    </div>

    <script src="{{ url_for('static', filename='js/index-script.js') }}"></script>
  </body>
</html>
