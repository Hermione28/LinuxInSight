<!doctype html>
<html>
  <head>
    <title>Login</title>
    <style>
      body {
        background: #0f172a;
        color: white;
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .box {
        background: #1e293b;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
      }

      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 5px;
        border: none;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #3b82f6;
        border: none;
        color: white;
        border-radius: 5px;
      }
    </style>
  </head>

  <body>
    <form class="box" method="POST">
      <h2>🔐 Login</h2>
      <input type="text" name="username" placeholder="Username" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
  </body>
</html>
